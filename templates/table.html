<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Prediction Results</title>

    <style>

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 15px;
        }

        th {
            background-color: #34495e;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: gray;
            font-size: 13px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Network Security Prediction Results</h2>

        <!-- Table coming from FastAPI / Jinja -->
        {{ table | safe }}

        <div class="footer">
            Generated by Network Security ML System
        </div>

    </div>

</body>

</html>
